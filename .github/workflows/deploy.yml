name: Deploy Flutter Web

on:
  push:
    branches:
      - main  # অথবা আপনার ডিফল্ট ব্রাঞ্চের নাম

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.10.1' # আপনার flutter version অনুযায়ী পরিবর্তন করতে পারেন

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --base-href "/YOUR_REPO_NAME/" # GitHub Pages এর জন্য repo name প্রয়োজন

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
